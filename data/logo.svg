<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44" fill="none" role="img" aria-label="Lochitra logo">
  <defs>
    <linearGradient id="lg-stem" x1="12" y1="6" x2="12" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="lg-base" x1="12" y1="33" x2="36" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Vertical stem of L (circuit path) -->
  <rect x="9" y="6" width="6" height="27" rx="1.5" fill="url(#lg-stem)"/>

  <!-- Horizontal base of L (circuit path) -->
  <rect x="9" y="30" width="26" height="6" rx="1.5" fill="url(#lg-base)"/>

  <!-- Node: top of stem -->
  <circle cx="12" cy="7.5" r="2.5" fill="#06B6D4"/>

  <!-- Node: corner junction (L bend) -->
  <circle cx="12" cy="33" r="3" fill="#06B6D4"/>

  <!-- Node: mid-stem -->
  <circle cx="12" cy="19" r="2" fill="#2563EB" opacity="0.6"/>

  <!-- Node: end of base (terminal) -->
  <circle cx="35" cy="33" r="2.5" fill="#06B6D4"/>

  <!-- Tiny circuit branch off mid-stem (horizontal tick) -->
  <rect x="15" y="17.5" width="7" height="3" rx="1" fill="#06B6D4" opacity="0.45"/>
  <circle cx="22" cy="19" r="1.5" fill="#06B6D4" opacity="0.7"/>
</svg>