<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="AI Tools category illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="node-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- Neural network connections -->
  <g stroke="#7c3aed" stroke-width="1.5" opacity="0.4">
    <!-- Layer 1 to Layer 2 -->
    <line x1="220" y1="140" x2="360" y2="180"/>
    <line x1="220" y1="225" x2="360" y2="180"/>
    <line x1="220" y1="310" x2="360" y2="180"/>
    <line x1="220" y1="140" x2="360" y2="270"/>
    <line x1="220" y1="225" x2="360" y2="270"/>
    <line x1="220" y1="310" x2="360" y2="270"/>
    <!-- Layer 2 to Layer 3 -->
    <line x1="360" y1="180" x2="500" y2="140"/>
    <line x1="360" y1="180" x2="500" y2="225"/>
    <line x1="360" y1="180" x2="500" y2="310"/>
    <line x1="360" y1="270" x2="500" y2="140"/>
    <line x1="360" y1="270" x2="500" y2="225"/>
    <line x1="360" y1="270" x2="500" y2="310"/>
    <!-- Layer 3 to Output -->
    <line x1="500" y1="140" x2="600" y2="225"/>
    <line x1="500" y1="225" x2="600" y2="225"/>
    <line x1="500" y1="310" x2="600" y2="225"/>
  </g>

  <!-- Neural nodes — Layer 1 (input) -->
  <g filter="url(#glow)">
    <circle cx="220" cy="140" r="16" fill="url(#node-glow)" opacity="0.9"/>
    <circle cx="220" cy="225" r="16" fill="url(#node-glow)" opacity="0.9"/>
    <circle cx="220" cy="310" r="16" fill="url(#node-glow)" opacity="0.9"/>
  </g>
  <!-- Layer 2 (hidden) -->
  <g filter="url(#glow)">
    <circle cx="360" cy="180" r="20" fill="#6d28d9"/>
    <circle cx="360" cy="270" r="20" fill="#6d28d9"/>
  </g>
  <!-- Layer 3 (hidden) -->
  <g filter="url(#glow)">
    <circle cx="500" cy="140" r="16" fill="#7c3aed" opacity="0.85"/>
    <circle cx="500" cy="225" r="16" fill="#7c3aed" opacity="0.85"/>
    <circle cx="500" cy="310" r="16" fill="#7c3aed" opacity="0.85"/>
  </g>
  <!-- Output node -->
  <circle cx="600" cy="225" r="24" fill="#8b5cf6" filter="url(#glow)"/>
  <circle cx="600" cy="225" r="14" fill="#a78bfa"/>

  <!-- Decorative accent dots -->
  <circle cx="680" cy="100" r="6" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="710" cy="350" r="4" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="100" cy="380" r="5" fill="#7c3aed" opacity="0.3"/>
  <circle cx="130" cy="80" r="8" fill="#a78bfa" opacity="0.25"/>

  <!-- Bottom label bar -->
  <rect x="0" y="400" width="800" height="50" fill="#0f0a2e" opacity="0.6"/>
  <text x="32" y="431" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#a78bfa" letter-spacing="2">AI TOOLS</text>
  <text x="760" y="431" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#6d28d9" text-anchor="end" opacity="0.8">LOCHITRA</text>
</svg>
