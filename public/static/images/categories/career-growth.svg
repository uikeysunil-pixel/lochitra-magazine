<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Career Growth category illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c0f00"/>
      <stop offset="100%" stop-color="#431407"/>
    </linearGradient>
    <linearGradient id="step-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle diagonal lines pattern -->
  <g stroke="#7c2d12" stroke-width="1" opacity="0.12">
    <line x1="0" y1="450" x2="450" y2="0"/>
    <line x1="100" y1="450" x2="550" y2="0"/>
    <line x1="200" y1="450" x2="650" y2="0"/>
    <line x1="300" y1="450" x2="750" y2="0"/>
    <line x1="400" y1="450" x2="850" y2="0"/>
    <line x1="500" y1="450" x2="950" y2="0"/>
  </g>

  <!-- Ascending staircase / steps -->
  <!-- Step 1 (lowest) -->
  <rect x="130" y="330" width="95" height="45" rx="4" fill="url(#step-grad)" opacity="0.45"/>
  <!-- Step 2 -->
  <rect x="225" y="285" width="95" height="90" rx="4" fill="url(#step-grad)" opacity="0.55"/>
  <!-- Step 3 -->
  <rect x="320" y="240" width="95" height="135" rx="4" fill="url(#step-grad)" opacity="0.65"/>
  <!-- Step 4 -->
  <rect x="415" y="190" width="95" height="185" rx="4" fill="url(#step-grad)" opacity="0.75"/>
  <!-- Step 5 (highest) -->
  <rect x="510" y="135" width="95" height="240" rx="4" fill="url(#step-grad)" opacity="0.88"/>

  <!-- Highlight top edges of steps -->
  <g stroke="url(#accent-grad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <line x1="130" y1="330" x2="225" y2="330"/>
    <line x1="225" y1="285" x2="320" y2="285"/>
    <line x1="320" y1="240" x2="415" y2="240"/>
    <line x1="415" y1="190" x2="510" y2="190"/>
    <line x1="510" y1="135" x2="605" y2="135"/>
  </g>

  <!-- Person silhouette at top (abstract) -->
  <circle cx="570" cy="108" r="14" fill="#fb923c" opacity="0.9" filter="url(#glow)"/>
  <rect x="562" y="122" width="16" height="22" rx="6" fill="#f97316" opacity="0.8"/>

  <!-- Rising arrow trajectory -->
  <polyline
    points="177,330 270,285 365,240 460,190 553,135"
    fill="none"
    stroke="#fbbf24"
    stroke-width="2"
    stroke-dasharray="6 4"
    opacity="0.5"
  />

  <!-- Star / achievement marker -->
  <text x="648" y="145" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#fbbf24" opacity="0.7" filter="url(#glow)">★</text>

  <!-- Decorative small elements -->
  <circle cx="680" cy="280" r="7" fill="#f97316" opacity="0.15"/>
  <circle cx="100" cy="200" r="5" fill="#fb923c" opacity="0.15"/>
  <circle cx="700" cy="370" r="9" fill="#c2410c" opacity="0.12"/>

  <!-- Subtle "LEVEL UP" text watermark -->
  <text x="90" y="410" font-family="Inter, system-ui, sans-serif" font-size="60" font-weight="900" fill="#7c2d12" opacity="0.08" letter-spacing="8">LEVEL UP</text>

  <!-- Bottom label bar -->
  <rect x="0" y="400" width="800" height="50" fill="#0c0600" opacity="0.65"/>
  <text x="32" y="431" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#fb923c" letter-spacing="2">CAREER GROWTH</text>
  <text x="760" y="431" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#c2410c" text-anchor="end" opacity="0.8">LOCHITRA</text>
</svg>
