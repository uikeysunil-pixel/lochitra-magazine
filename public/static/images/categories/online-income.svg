<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Online Income category illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#15803d" stroke-width="1" opacity="0.15">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="175" x2="800" y2="175"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="325" x2="800" y2="325"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="410" y1="0" x2="410" y2="400"/>
    <line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="670" y1="0" x2="670" y2="400"/>
  </g>

  <!-- Chart bars (ascending — income growth) -->
  <rect x="155" y="320" width="60" height="55" rx="4" fill="url(#bar-grad)" opacity="0.5"/>
  <rect x="235" y="280" width="60" height="95" rx="4" fill="url(#bar-grad)" opacity="0.6"/>
  <rect x="315" y="240" width="60" height="135" rx="4" fill="url(#bar-grad)" opacity="0.7"/>
  <rect x="395" y="190" width="60" height="185" rx="4" fill="url(#bar-grad)" opacity="0.8"/>
  <rect x="475" y="145" width="60" height="230" rx="4" fill="url(#bar-grad)" opacity="0.85"/>
  <rect x="555" y="100" width="60" height="275" rx="4" fill="url(#bar-grad)" opacity="0.9"/>

  <!-- Trend line over bars -->
  <polyline
    points="185,315 265,275 345,235 425,185 505,140 585,95"
    fill="none"
    stroke="url(#line-grad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    opacity="0.9"
  />

  <!-- Data points on trend line -->
  <g fill="#4ade80" filter="url(#glow)">
    <circle cx="185" cy="315" r="5"/>
    <circle cx="265" cy="275" r="5"/>
    <circle cx="345" cy="235" r="5"/>
    <circle cx="425" cy="185" r="5"/>
    <circle cx="505" cy="140" r="5"/>
    <circle cx="585" cy="95" r="7"/>
  </g>

  <!-- Arrow at top showing upward trend -->
  <polygon points="585,70 578,88 592,88" fill="#4ade80" opacity="0.9" filter="url(#glow)"/>

  <!-- Decorative dollar symbol (subtle) -->
  <text x="90" y="240" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="900" fill="#16a34a" opacity="0.1">$</text>

  <!-- Small accent circles -->
  <circle cx="700" cy="90" r="8" fill="#22c55e" opacity="0.2"/>
  <circle cx="730" cy="350" r="5" fill="#4ade80" opacity="0.15"/>
  <circle cx="100" cy="120" r="6" fill="#16a34a" opacity="0.2"/>

  <!-- Bottom label bar -->
  <rect x="0" y="400" width="800" height="50" fill="#021209" opacity="0.65"/>
  <text x="32" y="431" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#4ade80" letter-spacing="2">ONLINE INCOME</text>
  <text x="760" y="431" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#16a34a" text-anchor="end" opacity="0.8">LOCHITRA</text>
</svg>
