<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Technology category illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1a3a"/>
      <stop offset="100%" stop-color="#0e2f6e"/>
    </linearGradient>
    <linearGradient id="circuit-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Circuit board background traces -->
  <g stroke="#1e40af" stroke-width="1" opacity="0.2" fill="none">
    <!-- Horizontal traces -->
    <polyline points="0,80 180,80 180,120 350,120"/>
    <polyline points="0,180 120,180 120,220 280,220 280,260 420,260"/>
    <polyline points="0,320 200,320 200,280 380,280"/>
    <polyline points="600,80 700,80 700,160 800,160"/>
    <polyline points="500,300 650,300 650,380 800,380"/>
    <!-- Vertical traces -->
    <polyline points="480,0 480,100 520,100 520,200"/>
    <polyline points="620,0 620,60 660,60 660,150"/>
  </g>

  <!-- Main circuit paths (bright) -->
  <g stroke="url(#circuit-glow)" stroke-width="2.5" opacity="0.6" fill="none" filter="url(#glow)">
    <polyline points="80,225 200,225 200,160 320,160 320,225 460,225"/>
    <polyline points="460,225 460,300 550,300"/>
    <polyline points="320,160 320,100 440,100 440,160"/>
  </g>

  <!-- Circuit nodes / pads -->
  <g fill="#06B6D4" filter="url(#glow)">
    <circle cx="200" cy="225" r="7"/>
    <circle cx="320" cy="160" r="9"/>
    <circle cx="460" cy="225" r="7"/>
    <circle cx="440" cy="160" r="6"/>
    <circle cx="320" cy="100" r="6"/>
    <circle cx="550" cy="300" r="8"/>
  </g>

  <!-- CPU-style chip in the center -->
  <rect x="290" y="160" width="110" height="80" rx="6" fill="#0f172a" stroke="#2563EB" stroke-width="2" opacity="0.9"/>
  <rect x="300" y="170" width="90" height="60" rx="3" fill="#1e40af" opacity="0.5"/>
  <!-- Chip pins -->
  <g stroke="#06B6D4" stroke-width="2" opacity="0.7">
    <line x1="310" y1="160" x2="310" y2="148"/>
    <line x1="330" y1="160" x2="330" y2="148"/>
    <line x1="350" y1="160" x2="350" y2="148"/>
    <line x1="370" y1="160" x2="370" y2="148"/>
    <line x1="310" y1="240" x2="310" y2="252"/>
    <line x1="330" y1="240" x2="330" y2="252"/>
    <line x1="350" y1="240" x2="350" y2="252"/>
    <line x1="370" y1="240" x2="370" y2="252"/>
    <line x1="290" y1="175" x2="278" y2="175"/>
    <line x1="290" y1="195" x2="278" y2="195"/>
    <line x1="290" y1="215" x2="278" y2="215"/>
    <line x1="400" y1="175" x2="412" y2="175"/>
    <line x1="400" y1="195" x2="412" y2="195"/>
    <line x1="400" y1="215" x2="412" y2="215"/>
  </g>

  <!-- Data flow dots animating along path (static representation) -->
  <circle cx="260" cy="225" r="4" fill="#60a5fa" opacity="0.8"/>
  <circle cx="390" cy="225" r="4" fill="#60a5fa" opacity="0.6"/>
  <circle cx="320" cy="130" r="4" fill="#06B6D4" opacity="0.8"/>

  <!-- Decorative corner elements -->
  <rect x="650" y="90" width="60" height="40" rx="4" fill="none" stroke="#2563EB" stroke-width="1.5" opacity="0.3"/>
  <rect x="90" y="320" width="80" height="50" rx="4" fill="none" stroke="#1d4ed8" stroke-width="1.5" opacity="0.25"/>

  <!-- Bottom label bar -->
  <rect x="0" y="400" width="800" height="50" fill="#060c1c" opacity="0.65"/>
  <text x="32" y="431" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#60a5fa" letter-spacing="2">TECHNOLOGY</text>
  <text x="760" y="431" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#2563EB" text-anchor="end" opacity="0.8">LOCHITRA</text>
</svg>
